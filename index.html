<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Síndico - AbrangeBox</title>
    <style>
        :root { --bg: #f1f5f9; --card: #ffffff; --primary: #10b981; --text: #1e293b; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); padding: 40px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .container { width: 100%; max-width: 900px; display: none; position: relative; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .card h3 { font-size: 14px; color: #64748b; margin-bottom: 10px; }
        .card p { font-size: 24px; font-weight: 700; color: var(--text); }
        .btn { display: inline-block; padding: 10px 20px; background: var(--primary); color: white; text-decoration: none; border-radius: 8px; margin-top: 20px; font-weight: 600; border: none; cursor: pointer; }
        .btn:hover { background-color: #059669; }
        .btn-logout { position: absolute; top: 0; right: 0; background-color: var(--danger); }
        .btn-logout:hover { background-color: #dc2626; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; }
        th { background-color: #f8fafc; color: #64748b; font-size: 14px; }

        /* Estilo da Caixa de Login do Admin */
        .login-box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 380px; border: 1px solid #e2e8f0; text-align: center; margin-top: 10vh; }
        .login-box input { width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 20px; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; background-color: #f8fafc; }
        .login-box label { font-weight: 600; display: block; text-align: left; color: #1e293b; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-box" id="caixa-login">
    <div style="margin-bottom: 20px;"><img src="logo.png" alt="Logo" style="max-width: 220px; height: auto;"></div>
    <h3>Painel do Síndico</h3>
    <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Acesso restrito ao administrador</p>
    <form onsubmit="autenticarAdmin(event)">
        <label>Senha Master:</label>
        <input type="password" id="senha-admin" placeholder="Digite a senha ADM" required>
        <div id="erro-login" style="color: var(--danger); font-size: 13px; margin-bottom: 15px; display: none; font-weight: 600;"></div>
        <button type="submit" class="btn" id="btn-entrar" style="width: 100%; margin-top: 0;">Entrar no Sistema</button>
    </form>
</div>

<div class="container" id="conteudo-dashboard">
    <button class="btn btn-logout" onclick="efetuarLogout()">Sair do Painel</button>
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="logo.png" alt="Logo AbrangeBox" style="max-width: 550px; height: auto;">
    </div>
    <h1>Dashboard Admin: <span style="color: #64748b;">Consumo Geral do Condomínio</span></h1>
    
    <div class="stats-grid">
        <div class="card"><h3>Consumo Geral Acumulado</h3><p id="total-geral">Buscando...</p></div>
        <div class="card"><h3>Total de Leituras Gravadas</h3><p id="total-registros">0</p></div>
    </div>

    <div class="card">
        <h3>Histórico de Leituras Globais</h3>
        <table id="tabela-geral">
            <thead><tr><th>Data/Hora</th><th>Vaga</th><th>Leitura Atual</th></tr></thead>
            <tbody id="corpo-tabela"></tbody>
        </table>
        <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vRLD2uF87sgX7w16nG1vacYkFTG4RalaD8iV93LCSSj-pfk05TQO7t1OflNS_IBqL7dp1gP6tUF4-kv/pub?gid=0&single=true&output=csv" target="_blank" class="btn">Abrir Planilha Original</a>
    </div>
</div>

<script>
    const URL_GAS = 'https://script.google.com/macros/s/AKfycbw4WG8kjvhsYHwn0lKd59q8kMonyKltpFw5AmvCgWC2OAFvST7RKq2M9OkycFdw2LmP/exec';

    window.onload = function() {
        // Se já tiver uma sessão ativa do admin, carrega direto
        if (sessionStorage.getItem('adminLogado') === 'true') {
            exibirDashboard();
        }
    };

    async function autenticarAdmin(event) {
        event.preventDefault();
        const senha = document.getElementById('senha-admin').value;
        const erro = document.getElementById('erro-login');
        const btn = document.getElementById('btn-entrar');

        erro.style.display = 'none';
        btn.innerText = 'Verificando...';
        btn.disabled = true;

        try {
            const resposta = await fetch(URL_GAS, {
                method: 'POST',
                body: JSON.stringify({ vaga: "ADMIN", senha: senha, acao: "verificar_login" })
            });
            const resultado = await resposta.json();

            if (resultado.status === "sucesso") {
                sessionStorage.setItem('adminLogado', 'true');
                sessionStorage.setItem('adminSenha', senha);
                exibirDashboard();
            } else {
                erro.innerText = "Senha Master incorreta!";
                erro.style.display = 'block';
                btn.innerText = 'Entrar no Sistema';
                btn.disabled = false;
            }
        } catch (e) {
            erro.innerText = "Erro ao conectar ao servidor.";
            erro.style.display = 'block';
            btn.innerText = 'Entrar no Sistema';
            btn.disabled = false;
        }
    }

    function exibirDashboard() {
        document.getElementById('caixa-login').style.display = 'none';
        document.getElementById('conteudo-dashboard').style.display = 'block';
        carregarDadosGlobais();
    }

    async function carregarDadosGlobais() {
        const senha = sessionStorage.getItem('adminSenha');
        try {
            const resposta = await fetch(URL_GAS, {
                method: 'POST',
                body: JSON.stringify({ vaga: "ADMIN", senha: senha, acao: "buscar_todos_os_dados" })
            });
            const resultado = await resposta.json();

            if (resultado.status === "sucesso") {
                renderizarPainelSindico(resultado.dados);
            }
        } catch (error) {
            document.getElementById('corpo-tabela').innerHTML = "<tr><td colspan='3' style='color: var(--danger); text-align: center;'>Erro ao atualizar tabela.</td></tr>";
        }
    }

    function renderizarPainelSindico(dados) {
        const corpo = document.getElementById('corpo-tabela');
        corpo.innerHTML = "";
        document.getElementById('total-registros').innerText = dados.length;

        if (dados.length === 0) {
            document.getElementById('total-geral').innerText = "0.00 kWh";
            corpo.innerHTML = "<tr><td colspan='3' style='text-align: center;'>Nenhum dado encontrado.</td></tr>";
            return;
        }

        const ultimasLeiturasPorVaga = {};
        const dadosInvertidos = [...dados].reverse();

        dadosInvertidos.forEach(item => {
            var vagaKey = item.vaga.toUpperCase();
            if (!(vagaKey in ultimasLeiturasPorVaga)) {
                ultimasLeiturasPorVaga[vagaKey] = item.consumo;
            }
            corpo.innerHTML += `<tr>
                <td>${new Date(item.data).toLocaleString('pt-BR')}</td>
                <td><strong>${item.vaga.toUpperCase()}</strong></td>
                <td>${item.consumo.toFixed(2)} kWh</td>
            </tr>`;
        });

        let somaTotalCondominio = 0;
        for (const vaga in ultimasLeiturasPorVaga) {
            somaTotalCondominio += ultimasLeiturasPorVaga[vaga];
        }
        document.getElementById('total-geral').innerText = somaTotalCondominio.toFixed(2) + " kWh";
    }

    function efetuaraLogout() {
        sessionStorage.clear();
        window.location.reload();
    }
</script>
</body>
</html>
